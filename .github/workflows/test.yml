name: Tests & Build

on:
  push:
    branches: [master, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [master, develop]

env:
  JAVA_VERSION: '21'

jobs:
  check-changes:
    name: Check for Code Changes
    runs-on: ubuntu-latest
    outputs:
      should_test: ${{ steps.changes.outputs.should_test }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for code file changes
        id: changes
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message || github.event.pull_request.title }}"

          if [[ "$COMMIT_MSG" == *"[skip ci]"* ]] || [[ "$COMMIT_MSG" == *"[ci skip]"* ]]; then
            echo "⏭️ Skipping due to [skip ci]"
            echo "should_test=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [[ "$COMMIT_MSG" == *"[force deploy]"* ]]; then
            echo "✅ Force deploy requested"
            echo "should_test=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          SHOULD_TEST="false"
          while IFS= read -r file; do
            if [[ "$file" == */src/main/java/* ]] || \
               [[ "$file" == */src/main/resources/* ]] || \
               [[ "$file" == */src/test/* ]] || \
               [[ "$file" == common/* ]] || \
               [[ "$file" == bukkit/* ]] || \
               [[ "$file" == fabric/* ]] || \
               [[ "$file" == forge/* ]] || \
               [[ "$file" == neoforge/* ]] || \
               [[ "$file" == "build.gradle.kts" ]] || \
               [[ "$file" == "settings.gradle.kts" ]] || \
               [[ "$file" == "gradle.properties" ]] || \
               [[ "$file" == "gradle/libs.versions.toml" ]] || \
               [[ "$file" == */build.gradle.kts ]]; then
              SHOULD_TEST="true"
              echo "✅ Code file changed: $file"
              break
            fi
          done <<< "$CHANGED_FILES"

          echo "should_test=$SHOULD_TEST" >> $GITHUB_OUTPUT
          echo "Should test: $SHOULD_TEST"

  test-unit:
    name: 🧪 Unit Tests
    needs: check-changes
    if: needs.check-changes.outputs.should_test == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Grant execute permission
        run: chmod +x gradlew bukkit/gradlew
      - name: Run common tests
        run: ./gradlew :common:test --no-daemon
      - name: Run bukkit tests
        working-directory: bukkit
        run: ./gradlew test --no-daemon
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/build/reports/tests/'

  build-bukkit:
    name: 🪣 Build Bukkit
    needs: check-changes
    if: needs.check-changes.outputs.should_test == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x bukkit/gradlew
      - name: Build Bukkit
        working-directory: bukkit
        run: ./gradlew build --no-daemon
      - uses: actions/upload-artifact@v7
        with:
          name: DisableVillagerTrade-Bukkit
          path: bukkit/build/libs/*.jar
          retention-days: 7

  build-fabric:
    name: 🧵 Build Fabric
    needs: check-changes
    if: needs.check-changes.outputs.should_test == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x fabric/gradlew
      - name: Build Fabric
        working-directory: fabric
        run: ./gradlew build --no-daemon
      - uses: actions/upload-artifact@v7
        with:
          name: DisableVillagerTrade-Fabric
          path: fabric/build/libs/*.jar
          retention-days: 7

  build-forge:
    name: 🔥 Build Forge
    needs: check-changes
    if: needs.check-changes.outputs.should_test == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x forge/gradlew
      - name: Build Forge
        working-directory: forge
        run: ./gradlew build --no-daemon
      - uses: actions/upload-artifact@v7
        with:
          name: DisableVillagerTrade-Forge
          path: forge/build/libs/*.jar
          retention-days: 7

  build-neoforge:
    name: ⚒️ Build NeoForge
    needs: check-changes
    if: needs.check-changes.outputs.should_test == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x neoforge/gradlew
      - name: Build NeoForge
        working-directory: neoforge
        run: ./gradlew build --no-daemon
      - uses: actions/upload-artifact@v7
        with:
          name: DisableVillagerTrade-NeoForge
          path: neoforge/build/libs/*.jar
          retention-days: 7

  summary:
    name: 📊 Build Summary
    needs: [check-changes, test-unit, build-bukkit, build-fabric, build-forge, build-neoforge]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate build summary
        run: |
          echo "## 🏗️ Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.check-changes.outputs.should_test }}" != "true" ]; then
            echo "⏭️ Build skipped — no relevant code changes." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          [ "${{ needs.test-unit.result }}" == "success" ] && echo "| Unit Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY || echo "| Unit Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          [ "${{ needs.build-bukkit.result }}" == "success" ] && echo "| Bukkit | ✅ Built |" >> $GITHUB_STEP_SUMMARY || echo "| Bukkit | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          [ "${{ needs.build-fabric.result }}" == "success" ] && echo "| Fabric | ✅ Built |" >> $GITHUB_STEP_SUMMARY || echo "| Fabric | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          [ "${{ needs.build-forge.result }}" == "success" ] && echo "| Forge | ✅ Built |" >> $GITHUB_STEP_SUMMARY || echo "| Forge | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          [ "${{ needs.build-neoforge.result }}" == "success" ] && echo "| NeoForge | ✅ Built |" >> $GITHUB_STEP_SUMMARY || echo "| NeoForge | ❌ Failed |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 📦 Artifacts available in the Actions artifacts section." >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.test-unit.result }}" != "success" ] || \
             [ "${{ needs.build-bukkit.result }}" != "success" ] || \
             [ "${{ needs.build-fabric.result }}" != "success" ] || \
             [ "${{ needs.build-forge.result }}" != "success" ] || \
             [ "${{ needs.build-neoforge.result }}" != "success" ]; then
            exit 1
          fi
