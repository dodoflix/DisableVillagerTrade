name: Release

on:
  push:
    branches:
      - master
      - develop

permissions:
  contents: write

jobs:
  release:
    uses: dodoflix/mc-multiplatform-toolkit/.github/workflows/release.yml@main
    with:
      mod-name: DisableVillagerTrade
      mod-id: disablevillagertrade
      java-version: '21'
      run-bukkit: true
      run-fabric: true
      run-forge: true
      run-neoforge: true
      modrinth-project-id: ${{ vars.MODRINTH_PROJECT_ID }}
      bukkit-mc-versions: |
        1.14
        1.14.1
        1.14.2
        1.14.3
        1.14.4
        1.15
        1.15.1
        1.15.2
        1.16
        1.16.1
        1.16.2
        1.16.3
        1.16.4
        1.16.5
        1.17
        1.17.1
        1.18
        1.18.1
        1.18.2
        1.19
        1.19.1
        1.19.2
        1.19.3
        1.19.4
        1.20
        1.20.1
        1.20.2
        1.20.3
        1.20.4
        1.20.5
        1.20.6
        1.21
        1.21.1
        1.21.2
        1.21.3
        1.21.4
        1.21.5
        1.21.6
        1.21.7
        1.21.8
        1.21.9
        1.21.10
        1.21.11
      fabric-mc-versions: "1.21.11"
      forge-mc-versions: "1.21.11"
      neoforge-mc-versions: "1.21.11"
      production-branch: master
      develop-branch: develop
    secrets: inherit
