name: Bug Report
description: Report a bug to help improve the plugin
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill in the details below.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform/server software are you using?
      multiple: true
      options:
        - Bukkit/Spigot
        - Paper
        - Fabric
        - Forge
        - NeoForge
    validations:
      required: true

  - type: input
    id: mc-version
    attributes:
      label: Minecraft Version
      placeholder: "1.21.11"
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin/Mod Version
      placeholder: "2.2.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Install the plugin
        2. Place a villager
        3. Right-click the villager
        4. See unexpected behaviour
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Server Logs
      description: Paste any relevant logs from `logs/latest.log`.
      render: text
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Plugin Configuration
      description: Paste your `config.yml` if relevant.
      render: yaml
    validations:
      required: false
